<div class="login-page px-4">
  <div class="login-logo-glow" aria-hidden="true">
    <img src="logo2.svg" alt="" />
  </div>
  <div class="login-card w-full max-w-md rounded-2xl border border-white/5 bg-obsidian-grey p-8 shadow-2xl shadow-black/50">
    <div class="text-center">
      <img src="logo2.svg" alt="Mindfit" class="mx-auto mb-4 h-14 w-auto object-contain" />
      <h1 class="text-2xl font-semibold text-pure-white">Mindfit Ops</h1>
      <p class="mt-1 text-sm text-slate-grey">Sistema CMMS centralizado</p>
    </div>
    <form class="mt-8 space-y-5" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div>
        <label for="email" class="field-label">Email corporativo</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" class="field-input" placeholder="usuario@mindfit.cl" />
      </div>
      <div>
        <label for="password" class="field-label">Contraseña</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" class="field-input" placeholder="••••••••" />
      </div>
      @if (error()) {
        <p class="rounded-lg border border-orange-energy/30 bg-orange-energy/10 px-3 py-2 text-sm text-orange-energy">{{ error() }}</p>
      }
      @if (pendingRecoveryBanner()) {
        <p class="rounded-lg border border-white/10 bg-deep-black/50 px-3 py-2 text-sm text-slate-grey">
          {{ pendingRecoveryBanner() }}
        </p>
      }
      <button type="submit" class="btn-primary w-full" [disabled]="loading() || form.invalid">
        @if (loading()) { Ingresando... } @else { Iniciar sesion }
      </button>
    </form>

    <div class="mt-4 border-t border-white/5 pt-4">
      <button
        type="button"
        class="w-full text-center text-sm text-orange-energy hover:underline"
        (click)="openRecoveryModal()"
      >
        ¿Olvidaste tu contraseña?
      </button>
    </div>

    <p class="mt-6 text-center text-xs text-slate-grey">Mindfit Ops CMMS</p>
  </div>
</div>

<app-password-reset-modal
  [open]="recoveryModalOpen()"
  (closed)="onRecoveryClosed()"
  (declined)="onRecoveryDeclined()"
/>
