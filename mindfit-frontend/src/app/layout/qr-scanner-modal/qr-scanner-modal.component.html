<div class="fixed inset-0 z-50 flex items-center justify-center bg-deep-black/90 p-4 backdrop-blur-sm">
  <div class="relative w-full max-w-lg overflow-hidden rounded-2xl border border-white/10 bg-obsidian-grey p-4">
    <div class="mb-3 flex items-center justify-between">
      <h2 class="text-lg font-semibold text-pure-white">Escanear activo (QR)</h2>
      <button type="button" class="btn-ghost" (click)="close()" aria-label="Cerrar">✕</button>
    </div>
    <div class="overflow-hidden rounded-xl border border-white/5">
      <ngx-scanner-qrcode
        class="block w-full"
        (event)="onScan($event)"
      ></ngx-scanner-qrcode>
    </div>
    @if (processing()) {
      <p class="mt-3 text-center text-xs text-orange-energy">Buscando activo y OT...</p>
    } @else {
      <p class="mt-3 text-center text-xs text-slate-grey">
        Apunta la cámara al código QR del activo
      </p>
    }
  </div>
</div>
