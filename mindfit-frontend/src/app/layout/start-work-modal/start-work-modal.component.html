<div class="fixed inset-0 z-[60] flex items-end justify-center bg-deep-black/85 p-4 backdrop-blur-sm sm:items-center">
  <div class="w-full max-w-lg rounded-2xl border border-white/10 bg-obsidian-grey p-5 shadow-2xl" (click)="$event.stopPropagation()">
    <div class="mb-4 flex items-start justify-between gap-3">
      <div>
        <h2 class="text-lg font-semibold text-pure-white">Iniciar trabajo</h2>
        <p class="text-xs text-slate-grey">{{ orden().codigoOt }} · {{ orden().titulo }}</p>
      </div>
      <button type="button" class="btn-ghost" (click)="close()" aria-label="Cerrar">
        <lucide-icon name="x" [size]="18" />
      </button>
    </div>

    <p class="mb-3 text-sm text-slate-grey">
      Registra obligatoriamente el estado de la máquina <strong class="text-pure-white">antes</strong> de intervenir.
    </p>

    <div class="space-y-4">
      <div>
        <input
          #fileInput
          type="file"
          accept="image/*"
          class="sr-only"
          (change)="onFileSelected($event)"
        />
        <button type="button" class="upload-box w-full" (click)="openFilePicker()">
          <span class="upload-icon">📷</span>
          <span class="upload-label">Seleccionar foto Antes *</span>
        </button>
        @if (previewAntes()) {
          <img
            [src]="previewAntes()!"
            alt="Estado antes"
            class="mt-2 h-40 w-full rounded-lg object-cover border border-white/10"
          />
        }
      </div>

      @if (externalError(); as errMsg) {
        <p class="rounded-lg border border-orange-energy/30 bg-orange-energy/10 px-3 py-2 text-sm text-orange-energy">
          {{ errMsg }}
        </p>
      }

      @if (!hasPhoto() && !submitting()) {
        <p class="text-xs text-slate-grey">Selecciona la foto para habilitar el inicio.</p>
      }

      <button
        type="button"
        class="btn-primary w-full"
        [disabled]="submitting() || !hasPhoto()"
        (click)="submit()"
      >
        @if (submitting()) { Iniciando... } @else { Confirmar inicio y activar cronómetro }
      </button>
    </div>
  </div>
</div>
