<div class="modal-backdrop" (click)="close()">
  <div class="confirm-modal" (click)="$event.stopPropagation()">
    <button type="button" class="confirm-modal__close" (click)="close()" aria-label="Cerrar">
      <lucide-icon name="x" [size]="18" />
    </button>
    <h3 class="confirm-modal__title">Eliminar orden de trabajo</h3>
    <p class="confirm-modal__text">
      ¿Estás seguro de que deseas eliminar la Orden de Trabajo
      <strong>{{ orden().codigoOt }}</strong>? Esta acción ocultará la tarea del sistema.
    </p>
    <div class="confirm-modal__actions">
      <button type="button" class="btn-cancel" (click)="close()" [disabled]="deleting()">
        Cancelar
      </button>
      <button type="button" class="btn-danger" (click)="confirm()" [disabled]="deleting()">
        @if (deleting()) { Eliminando... } @else { Eliminar }
      </button>
    </div>
  </div>
</div>
