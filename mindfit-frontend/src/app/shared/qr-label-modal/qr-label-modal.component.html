<div class="modal-backdrop no-print" (click)="close()">
  <div class="qr-modal-shell" (click)="$event.stopPropagation()">
    <button
      type="button"
      class="qr-label-close no-print"
      (click)="close()"
      aria-label="Cerrar"
    >
      ×
    </button>

    @if (activo(); as a) {
      <div id="printable-qr-card" class="printable-qr-card">
        <img src="assets/mindfit-logo.png" alt="Mindfit" class="qr-logo" crossorigin="anonymous" />
        <p class="qr-brand">Mindfit Ops</p>
        <p class="qr-nombre">{{ a.nombre }}</p>
        <div class="qr-wrap">
          <qrcode [qrdata]="scanUrl(a)" [width]="200" errorCorrectionLevel="M" />
        </div>
        <p class="qr-codigo">{{ a.codigoInventario || a.codigoQrToken }}</p>
        <p class="qr-hint">Escanea para abrir ficha en terreno</p>
      </div>

      <div class="qr-modal-actions no-print">
        <button
          type="button"
          class="btn-ghost w-full"
          [disabled]="downloading()"
          (click)="descargarComoImagen()"
        >
          @if (downloading()) {
            Generando imagen...
          } @else {
            Descargar imagen
          }
        </button>
        <button type="button" class="btn-primary w-full" (click)="print()">
          Imprimir etiqueta
        </button>
      </div>
    }
  </div>
</div>
