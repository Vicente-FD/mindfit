<div class="modal-overlay" (click)="close()">
  <div class="modal-panel" (click)="$event.stopPropagation()">
    <div class="flex items-start justify-between gap-3 mb-3">
      <div>
        <h2 class="text-lg font-semibold text-pure-white">Dar de baja sucursal</h2>
        <p class="text-xs text-slate-grey">
          {{ sucursal().nombre }} · [{{ sucursal().sigla }}]
        </p>
      </div>
      <button type="button" class="btn-ghost" (click)="close()" aria-label="Cerrar">
        <lucide-icon name="x" [size]="18" />
      </button>
    </div>
    <p class="mb-4 text-sm text-slate-grey">
      La sede se eliminará de forma lógica (soft delete). Los activos, usuarios y órdenes de trabajo
      históricos permanecerán intactos para auditoría y reportes ejecutivos.
    </p>
    <div class="flex gap-2">
      <button type="button" class="btn-ghost flex-1" (click)="close()">Cancelar</button>
      <button
        type="button"
        class="btn-danger flex-1"
        [disabled]="deleting()"
        (click)="confirm()"
      >
        @if (deleting()) { Procesando... } @else { Confirmar baja }
      </button>
    </div>
  </div>
</div>
